name: Drift Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Only one drift check per PR at a time; cancel older runs when new commits arrive.
concurrency:
  group: drift-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Design Drift Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npx vite preview --port 4173 &
        # Give the server a moment to start
        # (using wait-on below instead of sleep)

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run drift check (JSON output)
        id: drift
        run: |
          node scripts/drift-check.mjs \
            --url http://localhost:4173 \
            --threshold ${{ vars.DRIFT_THRESHOLD || 80 }} \
            --routes "${{ vars.DRIFT_ROUTES || '/' }}" \
            --json > drift-report.json || true
          # 'true' so we don't fail here — we'll decide after reading the report
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat drift-report.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const reportRaw = fs.readFileSync('drift-report.json', 'utf8')
            const report = JSON.parse(reportRaw)
            const threshold = ${{ vars.DRIFT_THRESHOLD || 80 }}

            // Build markdown comment
            const lines = []
            lines.push('## Drift Report')
            lines.push('')

            const allPassed = report.passed
            lines.push(allPassed
              ? `✅ **All routes passed** (threshold: ${threshold}%)`
              : `⚠️ **Coverage below threshold** (threshold: ${threshold}%)`)
            lines.push('')

            for (const route of report.routes) {
              if (route.error) {
                lines.push(`### \`${route.route}\` — ❌ Scan failed`)
                lines.push(`> ${route.error}`)
                continue
              }

              const icon = route.pct >= threshold ? '✅' : '🔴'
              lines.push(`### \`${route.route}\` — ${icon} ${route.pct}% DS coverage`)
              lines.push(`| Metric | Value |`)
              lines.push(`|---|---|`)
              lines.push(`| DS components | ${route.ds} |`)
              lines.push(`| Custom (gaps) | ${route.total - route.ds} |`)
              lines.push(`| Total | ${route.total} |`)
              lines.push(`| Token violations | ${route.tokenViolations?.length ?? 0} |`)

              const gaps = Object.entries(route.gapMap ?? {}).sort((a, b) => b[1] - a[1])
              if (gaps.length > 0) {
                lines.push('')
                lines.push('**Custom components (gaps):**')
                lines.push(gaps.slice(0, 10).map(([name, count]) =>
                  `- \`${name}\` ×${count}${count >= 5 ? ' ⬆ *consider promoting to DS*' : ''}`
                ).join('\n'))
              }

              if (route.tokenViolations?.length > 0) {
                lines.push('')
                lines.push(`**Token violations (${route.tokenViolations.length} hardcoded colors):**`)
                lines.push(route.tokenViolations.slice(0, 5).map(v =>
                  `- \`${v.prop}: ${v.value}\` ×${v.count}`
                ).join('\n'))
              }
              lines.push('')
            }

            lines.push('---')
            lines.push('*Generated by [Drift](https://github.com/your-org/design-drift) · ' +
              `Threshold: ${threshold}% · ` +
              `[Configure](.github/workflows/drift-check.yml)*`)

            const body = lines.join('\n')

            // Find and update existing bot comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Drift Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      - name: Fail if below threshold (strict mode)
        if: ${{ vars.DRIFT_STRICT == 'true' }}
        run: |
          PASSED=$(node -e "const r = require('./drift-report.json'); process.exit(r.passed ? 0 : 1)")

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.json
          retention-days: 30
