name: Drift Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel older runs on the same ref when new commits arrive.
concurrency:
  group: drift-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Design Drift Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post/update PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Restore last main-branch baseline (for delta on PRs) ────────────────
      # The key never matches exactly (uses run_id), so restore-keys falls back
      # to the most-recently-saved cache with the drift-baseline- prefix.
      - name: Restore drift baseline
        id: restore-baseline
        uses: actions/cache/restore@v4
        with:
          path: drift-baseline.json
          key: drift-baseline-${{ github.run_id }}
          restore-keys: |
            drift-baseline-

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npx vite preview --port 4173 &

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      # ── Run the scanner ───────────────────────────────────────────────────────
      - name: Run drift check
        id: drift
        run: |
          node scripts/drift-check.mjs \
            --url http://localhost:4173 \
            --threshold ${{ vars.DRIFT_THRESHOLD || 80 }} \
            --routes "${{ vars.DRIFT_ROUTES || '/' }}" \
            --json > drift-report.json || true

      # ── Save this run as the new baseline (main/master only) ─────────────────
      - name: Save drift baseline
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: cp drift-report.json drift-baseline.json

      - name: Cache drift baseline
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/cache/save@v4
        with:
          path: drift-baseline.json
          key: drift-baseline-${{ github.run_id }}

      # ── Post PR comment with delta ────────────────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const threshold = ${{ vars.DRIFT_THRESHOLD || 80 }}

            const report   = JSON.parse(fs.readFileSync('drift-report.json', 'utf8'))
            const baseline = fs.existsSync('drift-baseline.json')
              ? JSON.parse(fs.readFileSync('drift-baseline.json', 'utf8'))
              : null

            // ── Delta helpers ──────────────────────────────────────────────────
            function baselineRoute(route) {
              if (!baseline?.routes) return null
              return baseline.routes.find(r => r.route === route) ?? null
            }

            function deltaStr(now, before) {
              if (before == null) return ''
              const diff = now - before
              if (diff === 0) return ' *(no change)*'
              return diff > 0
                ? ` *(+${diff}% vs main ↑)*`
                : ` **(${diff}% vs main ↓)**`
            }

            // ── Overall delta summary ─────────────────────────────────────────
            const routeResults = report.routes.filter(r => !r.error)
            const avgNow = routeResults.length
              ? Math.round(routeResults.reduce((s, r) => s + r.pct, 0) / routeResults.length)
              : null

            let baselineAvg = null
            if (baseline?.routes) {
              const baseRoutes = baseline.routes.filter(r => !r.error)
              if (baseRoutes.length) {
                baselineAvg = Math.round(
                  baseRoutes.reduce((s, r) => s + r.pct, 0) / baseRoutes.length
                )
              }
            }

            // ── Build comment ─────────────────────────────────────────────────
            const lines = []

            // Header with delta
            if (avgNow != null && baselineAvg != null) {
              const diff = avgNow - baselineAvg
              const trend = diff > 0 ? '↑' : diff < 0 ? '↓' : '→'
              const trendEmoji = diff > 0 ? '✅' : diff < 0 ? '⚠️' : '➡️'
              lines.push(`## ${trendEmoji} Drift Delta`)
              lines.push('')
              lines.push(
                `**${baselineAvg}% → ${avgNow}%** ${trend} ` +
                `${diff !== 0 ? `${diff > 0 ? '+' : ''}${diff}% since main` : 'no change'}`
              )
            } else {
              lines.push('## 📊 Drift Report')
            }

            lines.push('')
            lines.push(report.passed
              ? `✅ All routes passed (threshold: ${threshold}%)`
              : `⚠️ Coverage below threshold (${threshold}%)`)
            lines.push('')

            // Per-route breakdown
            for (const route of report.routes) {
              if (route.error) {
                lines.push(`### \`${route.route}\` — ❌ Scan failed`)
                lines.push(`> ${route.error}`)
                lines.push('')
                continue
              }

              const base = baselineRoute(route.route)
              const icon = route.pct >= threshold ? '✅' : '🔴'
              const delta = base ? deltaStr(route.pct, base.pct) : ''
              lines.push(`### \`${route.route}\` — ${icon} ${route.pct}% DS coverage${delta}`)

              lines.push('| Metric | Value |')
              lines.push('|---|---|')
              lines.push(`| DS components | ${route.ds} |`)
              lines.push(`| Custom (drifted) | ${route.total - route.ds} |`)
              lines.push(`| Total | ${route.total} |`)
              lines.push(`| Token violations | ${route.tokenViolations?.length ?? 0} |`)

              // Gap list
              const gaps = Object.entries(route.gapMap ?? {}).sort((a, b) => b[1] - a[1])
              if (gaps.length > 0) {
                lines.push('')
                lines.push('**Custom components (not in DS):**')
                lines.push(gaps.slice(0, 10).map(([name, count]) =>
                  `- \`${name}\` ×${count}${count >= 5 ? ' ⬆ *consider promoting to DS*' : ''}`
                ).join('\n'))
              }

              // Token violations
              if (route.tokenViolations?.length > 0) {
                lines.push('')
                lines.push(`**Token violations (${route.tokenViolations.length} hardcoded colors):**`)
                lines.push(route.tokenViolations.slice(0, 5).map(v =>
                  `- \`${v.prop}: ${v.value}\` ×${v.count}`
                ).join('\n'))
              }

              lines.push('')
            }

            lines.push('---')
            lines.push(
              `*Generated by [Drift](https://github.com/dyoon92/design-drift) · ` +
              `Threshold: ${threshold}% · ` +
              `[Configure](.github/workflows/drift-check.yml)*`
            )

            const body = lines.join('\n')

            // Update existing bot comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              (c.body.includes('Drift Delta') || c.body.includes('Drift Report'))
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      # ── Fail CI if below threshold (when DRIFT_STRICT=true) ──────────────────
      - name: Fail if below threshold
        if: vars.DRIFT_STRICT == 'true'
        run: node -e "const r=require('./drift-report.json'); process.exit(r.passed ? 0 : 1)"

      # ── Always upload the report as an artifact ───────────────────────────────
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: drift-report.json
          retention-days: 90
